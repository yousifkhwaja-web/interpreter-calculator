<!DOCTYPE html>
<html>
<head>
    <title>Interpreter Payment Calculator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<div id="box">

    <h1>💸 Interpreter Payment Calculator</h1>

    <form onsubmit="calculatePayment(event)">

        <label>Interpreter Name:</label><br>
        <select id="interpreter">
            <option value="40">Mushtaq ($40/hour)</option>
            <option value="50">Mahdi ($50/hour)</option>
            <option value="30">Rahand ($30/hour)</option>
            <option value="45">Maher ($45/hour)</option>
        </select><br><br>

        <label>Minutes Worked:</label><br>
        <input type="number" id="minutes" placeholder="Enter minutes" required><br><br>

        <button type="submit">Calculate</button>

    </form>

    <h2>Result</h2>
    <p>USD: $<span id="usd">---</span></p>
    <p>IQD: <span id="iqd">---</span></p>

    <p style="font-size:12px; opacity:0.7;">
        Exchange Rate: <span id="rate">loading...</span>
    </p>

</div>

<script>

let exchangeRate = 1545; // fallback

// 🔥 FETCH LIVE RATE
async function getRate() {
    try {
        let res = await fetch("https://qamaralfajr.com/production/exchange_rates.php");
        let data = await res.json();

        exchangeRate = data.rates.IQD;

        document.getElementById("rate").innerText =
            "1 USD = " + exchangeRate + " IQD";

    } catch (err) {
        document.getElementById("rate").innerText =
            "offline mode (using fallback)";
    }
}

// run immediately + auto update
getRate();
setInterval(getRate, 10000);

// 💸 CALCULATE PAYMENT
function calculatePayment(event) {
    event.preventDefault();

    let hourlyRate = document.getElementById("interpreter").value;
    let minutes = document.getElementById("minutes").value;

    let usd = (minutes / 60) * hourlyRate;
    let iqd = usd * exchangeRate;

    document.getElementById("usd").innerText = usd.toFixed(2);
    document.getElementById("iqd").innerText = iqd.toLocaleString();
}

</script>

</body>
</html>
