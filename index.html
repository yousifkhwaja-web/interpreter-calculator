<!DOCTYPE html>
<html>
<head>
    <title>Interpreter Payment Calculator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="container">

    <div class="card">

        <h1>💸 Payment Calculator</h1>
        <p class="sub">Simple & fast interpreter earnings tool</p>

        <form onsubmit="calculatePayment(event)">

            <label>Interpreter</label>
            <select id="interpreter">
                <option value="40">Mushtaq ($40/hr)</option>
                <option value="50">Mahdi ($50/hr)</option>
                <option value="30">Rahand ($30/hr)</option>
                <option value="45">Maher ($45/hr)</option>
            </select>

            <label>Minutes Worked</label>
            <input type="number" id="minutes" placeholder="Enter minutes" required>

            <label>Exchange Rate (USD → IQD)</label>
            <input type="number" id="rate" value="1530" required>

            <button type="submit">Calculate</button>

        </form>

        <div class="result">

            <div class="box">
                <h3>USD</h3>
                <p>$<span id="usd">---</span></p>
            </div>

            <div class="box">
                <h3>IQD</h3>
                <p><span id="iqd">---</span></p>
            </div>

        </div>

    </div>

</div>

<script>

function calculatePayment(event) {
    event.preventDefault();

    let hourlyRate = document.getElementById("interpreter").value;
    let minutes = document.getElementById("minutes").value;
    let exchangeRate = document.getElementById("rate").value;

    let usd = (minutes / 60) * hourlyRate;
    let iqd = usd * exchangeRate;

    document.getElementById("usd").innerText = usd.toFixed(2);
    document.getElementById("iqd").innerText = iqd.toLocaleString();
}

</script>

</body>
</html>
